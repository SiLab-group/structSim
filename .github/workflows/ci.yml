name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4.7.0
        with:
          java-version: "11"
          distribution: temurin
          cache: maven

      - name: Run tests
        working-directory: structSimV1
        run: mvn test
